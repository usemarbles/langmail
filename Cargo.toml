[workspace]
resolver = "2"
members = [
  "crates/langmail-core",
  "crates/langmail-node",
]

[workspace.package]
version = "0.3.1"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/usemarbles/langmail"
description = "Email preprocessing for LLMs"

[workspace.dependencies]
langmail-core = { path = "crates/langmail-core" }

[workspace.metadata.release]
shared-version = true
tag-name = "v{{version}}"
pre-release-hook = ["../../scripts/release-prep.sh", "{{version}}"]
pre-release-commit-message = "chore(release): v{{version}}"
publish = false
