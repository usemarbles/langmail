[workspace]
resolver = "2"
members = [
  "crates/langmail-core",
  "crates/langmail-node",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nicely-done/langmail"
description = "Email preprocessing for LLMs"

[workspace.dependencies]
langmail-core = { path = "crates/langmail-core" }
