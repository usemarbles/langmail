name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  check-release:
    name: Check Release
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    outputs:
      needs_release: ${{ steps.check.outputs.needs_release }}
      next_version: ${{ steps.check.outputs.next_version }}
      bump: ${{ steps.check.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          echo "latest=$TAG" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: check
        run: |
          TAG="${{ steps.tag.outputs.latest }}"
          if [ -z "$TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${TAG}..HEAD"
          fi

          COMMITS=$(git log --pretty=format:"%s" $RANGE)

          BUMP=""
          if echo "$COMMITS" | grep -qiE "BREAKING[ -]CHANGE|^[a-z]+(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "needs_release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable commits found"
            exit 0
          fi

          # Parse current version from tag or Cargo.toml
          if [ -n "$TAG" ]; then
            CURRENT="${TAG#v}"
          else
            CURRENT=$(grep -m1 'version = ' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"

          echo "needs_release=true" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Will release v${NEXT} (${BUMP} bump)"

  prepare-release:
    name: Prepare Release
    needs: check-release
    if: needs.check-release.outputs.needs_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_notes: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        env:
          NEXT_VERSION: ${{ needs.check-release.outputs.next_version }}
        run: |
          # Bump workspace Cargo.toml
          sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}\"/" Cargo.toml

          # Bump packages/langmail/package.json — version and optionalDependencies
          PKG="packages/langmail/package.json"
          sed -i -E \
            -e 's/("version": )"[^"]+"/\1"'"${NEXT_VERSION}"'"/' \
            -e 's/("langmail-(win32|darwin|linux)-[^"]+": )"[^"]+"/\1"'"${NEXT_VERSION}"'"/g' \
            "$PKG"

      - name: Generate changelog
        env:
          NEXT_VERSION: ${{ needs.check-release.outputs.next_version }}
        run: git-cliff --tag "v${NEXT_VERSION}" -o CHANGELOG.md

      - name: Commit, tag, and push
        env:
          NEXT_VERSION: ${{ needs.check-release.outputs.next_version }}
        run: |
          git add Cargo.toml packages/langmail/package.json CHANGELOG.md
          git commit -m "chore: release v${NEXT_VERSION}"
          git tag "v${NEXT_VERSION}"
          git push origin main --follow-tags

      - name: Generate release notes
        id: notes
        env:
          NEXT_VERSION: ${{ needs.check-release.outputs.next_version }}
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          git-cliff --tag "v${NEXT_VERSION}" --latest --strip header >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

  github-release:
    name: Create GitHub Release
    needs: [check-release, prepare-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check-release.outputs.next_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-release.outputs.next_version }}
          body: ${{ needs.prepare-release.outputs.release_notes }}
          make_latest: true

  build-node-binaries:
    name: Build - ${{ matrix.target }}
    needs: [check-release, prepare-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check-release.outputs.next_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: ${{ matrix.use-cross }}
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: packages/langmail
        run: npm ci

      - name: Build native module
        if: ${{ !matrix.use-cross }}
        working-directory: packages/langmail
        run: npx napi build --platform --release --target ${{ matrix.target }} --no-js --manifest-path ../../crates/langmail-node/Cargo.toml --output-dir .

      - name: Build native module (cross)
        if: ${{ matrix.use-cross }}
        working-directory: packages/langmail
        run: npx napi build --platform --release --target ${{ matrix.target }} --no-js --use-cross --manifest-path ../../crates/langmail-node/Cargo.toml --output-dir .

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/langmail/langmail.*.node
          if-no-files-found: error
          retention-days: 1

  publish-npm:
    name: Publish to npm
    needs: [check-release, build-node-binaries]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check-release.outputs.next_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/langmail
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: packages/langmail/artifacts
          pattern: bindings-*
          merge-multiple: false

      - name: Generate platform npm package directories
        working-directory: packages/langmail
        run: npx napi create-npm-dirs --npm-dir npm

      - name: Distribute binaries to platform directories
        working-directory: packages/langmail
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Publish platform packages
        working-directory: packages/langmail
        run: |
          for dir in npm/*/; do
            npm publish "$dir" --provenance --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: packages/langmail
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
