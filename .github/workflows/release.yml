name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Path A: Releasable commits land on main → create release PR ───

  check-release:
    name: Check Release
    runs-on: ubuntu-latest
    concurrency:
      group: release-prepare
      cancel-in-progress: true
    if: >-
      !startsWith(github.event.head_commit.message, 'chore: release')
    outputs:
      needs_release: ${{ steps.check.outputs.needs_release }}
      next_version: ${{ steps.check.outputs.next_version }}
      bump: ${{ steps.check.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")
          echo "latest=$TAG" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: check
        run: |
          TAG="${{ steps.tag.outputs.latest }}"
          if [ -z "$TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${TAG}..HEAD"
          fi

          COMMITS=$(git log --pretty=format:"%s" $RANGE)

          BUMP=""
          if echo "$COMMITS" | grep -qiE "BREAKING[ -]CHANGE|^[a-z]+(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "needs_release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable commits found"
            exit 0
          fi

          # Parse current version from tag or Cargo.toml
          if [ -n "$TAG" ]; then
            CURRENT="${TAG#v}"
          else
            CURRENT=$(grep -m1 'version = ' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"

          echo "needs_release=true" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Will release v${NEXT} (${BUMP} bump)"

  prepare-release:
    name: Prepare Release
    needs: check-release
    if: needs.check-release.outputs.needs_release == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: release-prepare
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clean up existing release PR/branch
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # Close any existing release PRs
          EXISTING_PRS=$(gh pr list --head "release/" --json number --jq '.[].number')
          for pr in $EXISTING_PRS; do
            echo "Closing existing release PR #${pr}"
            gh pr close "$pr" --delete-branch || true
          done

      - name: Bump versions
        env:
          NEXT_VERSION: ${{ needs.check-release.outputs.next_version }}
        run: |
          # Bump workspace Cargo.toml
          sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}\"/" Cargo.toml

          # Bump crates/langmail-python/pyproject.toml
          sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}\"/" crates/langmail-python/pyproject.toml

          # Bump packages/langmail/package.json — version and optionalDependencies
          PKG="packages/langmail/package.json"
          jq --tab --arg v "$NEXT_VERSION" '
            .version = $v |
            .optionalDependencies |= with_entries(.value = $v)
          ' "$PKG" > "${PKG}.tmp" && mv "${PKG}.tmp" "$PKG"

      - name: Generate changelog
        env:
          NEXT_VERSION: ${{ needs.check-release.outputs.next_version }}
        run: git-cliff --tag "v${NEXT_VERSION}" -o CHANGELOG.md

      - name: Create release branch and PR
        env:
          NEXT_VERSION: ${{ needs.check-release.outputs.next_version }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          BRANCH="release/v${NEXT_VERSION}"

          git checkout -b "$BRANCH"
          git add Cargo.toml packages/langmail/package.json crates/langmail-python/pyproject.toml CHANGELOG.md
          git commit -m "chore: release v${NEXT_VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: release v${NEXT_VERSION}" \
            --body "Automated release PR for v${NEXT_VERSION}." \
            --base main \
            --head "$BRANCH"

          PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq '.number')
          gh pr merge "$PR_NUMBER" --auto --squash

  # ─── Path B: Release PR merged → tag, build, publish ───

  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    concurrency:
      group: release-publish
      cancel-in-progress: false
    if: >-
      startsWith(github.event.head_commit.message, 'chore: release')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.extract.outputs.version }}
      release_notes: ${{ steps.notes.outputs.body }}
      release_sha: ${{ steps.extract.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Extract version and create tag
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
        run: |
          VERSION=$(echo "$COMMIT_MSG" | grep -oP 'v\d+\.\d+\.\d+')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from commit message"
            exit 1
          fi
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          git-cliff --tag "v${VERSION}" --latest --strip header >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Delete release branch
        run: git push origin --delete "release/v${{ steps.extract.outputs.version }}" || true

  github-release:
    name: Create GitHub Release
    needs: [create-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.release_sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-tag.outputs.version }}
          body: ${{ needs.create-tag.outputs.release_notes }}
          make_latest: true

  publish-crates:
    name: Publish to crates.io
    needs: [create-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.release_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish langmail
        run: cargo publish -p langmail
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-node-binaries:
    name: Build - ${{ matrix.target }}
    needs: [create-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.release_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: ${{ matrix.use-cross }}
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: packages/langmail
        run: npm ci

      - name: Build native module
        if: ${{ !matrix.use-cross }}
        working-directory: packages/langmail
        run: npx napi build --platform --release --target ${{ matrix.target }} --no-js --manifest-path ../../crates/langmail-node/Cargo.toml --output-dir .

      - name: Build native module (cross)
        if: ${{ matrix.use-cross }}
        working-directory: packages/langmail
        run: npx napi build --platform --release --target ${{ matrix.target }} --no-js --use-cross --manifest-path ../../crates/langmail-node/Cargo.toml --output-dir .

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/langmail/langmail.*.node
          if-no-files-found: error
          retention-days: 1

  publish-npm:
    name: Publish to npm
    needs: [create-tag, build-node-binaries]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.release_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/langmail
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: packages/langmail/artifacts
          pattern: bindings-*
          merge-multiple: false

      - name: Generate platform npm package directories
        working-directory: packages/langmail
        run: npx napi create-npm-dirs --npm-dir npm

      - name: Distribute binaries to platform directories
        working-directory: packages/langmail
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Publish platform packages
        working-directory: packages/langmail
        run: |
          for dir in npm/*/; do
            npm publish "$dir" --provenance --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: packages/langmail
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-python-wheels:
    name: Python Wheels - ${{ matrix.os }} (${{ matrix.target }})
    needs: [create-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.release_sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 --manifest-path crates/langmail-python/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  build-python-sdist:
    name: Python sdist
    needs: [create-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.release_sha }}
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/langmail-python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    name: Publish to PyPI
    needs: [create-tag, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
