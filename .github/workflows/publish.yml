name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: ${{ !matrix.docker }}
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.docker }}
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: ${{ matrix.use-cross && !matrix.docker }}
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.docker }}
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        if: ${{ !matrix.docker }}
        working-directory: packages/langmail
        run: npm ci

      - name: Build native module
        if: ${{ !matrix.docker && !matrix.use-cross }}
        working-directory: packages/langmail
        run: npx napi build --platform --release --target ${{ matrix.target }} --js ${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'index.js' || 'false' }} --dts false --cargo-cwd ../../crates/langmail-node .

      - name: Build native module (cross)
        if: ${{ matrix.use-cross && !matrix.docker }}
        working-directory: packages/langmail
        env:
          CARGO: cross
        run: npx napi build --platform --release --target ${{ matrix.target }} --js false --dts false --cargo-cwd ../../crates/langmail-node .


      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/langmail/langmail.*.node
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        with:
          name: js-binding
          path: packages/langmail/index.js
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/langmail
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: packages/langmail/artifacts
          pattern: bindings-*
          merge-multiple: false

      - uses: actions/download-artifact@v4
        with:
          name: js-binding
          path: packages/langmail

      - name: Generate platform npm package directories
        working-directory: packages/langmail
        run: npx napi create-npm-dir -t .

      - name: Distribute binaries to platform directories
        working-directory: packages/langmail
        run: npx napi artifacts --dir artifacts --dist npm

      - name: Publish platform packages
        working-directory: packages/langmail
        run: |
          for dir in npm/*/; do
            npm publish "$dir" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: packages/langmail
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
